<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft - JavaScript Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Minecraft', Arial, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        
        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            font-size: 16px;
        }
        
        /* Crosshair */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
        }
        
        .crosshair-dot {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.8);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        /* Health Bar */
        #healthBar {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 2px;
        }
        
        .health-item {
            width: 8px;
            height: 8px;
            background: #8B0000;
            border: 1px solid #000;
        }
        
        .health-item.full {
            background: #FF0000;
            box-shadow: 0 0 5px #FF0000;
        }
        
        /* Hunger Bar */
        #hungerBar {
            position: absolute;
            bottom: 45px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 2px;
        }
        
        .hunger-item {
            width: 8px;
            height: 8px;
            background: #8B4513;
            border: 1px solid #000;
        }
        
        .hunger-item.full {
            background: #FFA500;
            box-shadow: 0 0 5px #FFA500;
        }
        
        /* Hotbar */
        #hotbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 2px;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px;
            border: 2px solid #444;
        }
        
        .hotbar-slot {
            width: 40px;
            height: 40px;
            background: #8B7355;
            border: 2px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #fff;
            cursor: pointer;
        }
        
        .hotbar-slot.selected {
            border-color: #fff;
            background: #A0826D;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        /* Info Panel */
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border: 2px solid #444;
            font-size: 12px;
            font-family: monospace;
        }
        
        .info-line {
            margin: 3px 0;
        }
        
        /* Menu */
        #menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            display: none;
            pointer-events: auto;
        }
        
        #menu.active {
            display: flex;
        }
        
        #menuContent {
            background: rgba(50, 50, 50, 0.95);
            padding: 40px;
            border: 3px solid #666;
            text-align: center;
            min-width: 400px;
        }
        
        #menuTitle {
            font-size: 48px;
            margin-bottom: 20px;
            color: #4CAF50;
            text-shadow: 2px 2px 4px #000;
        }
        
        .menu-button {
            background: #555;
            border: 2px solid #777;
            color: #fff;
            padding: 12px 30px;
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            pointer-events: auto;
        }
        
        .menu-button:hover {
            background: #777;
            transform: scale(1.05);
        }
        
        #miningBar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 30px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #fff;
            display: none;
            z-index: 50;
        }
        
        #miningProgress {
            height: 100%;
            background: #4CAF50;
            width: 0%;
            transition: width 0.1s;
        }
        
        #miningText {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 14px;
            white-space: nowrap;
        }
        
        /* Controls Help */
        #controls {
            position: absolute;
            bottom: 100px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border: 2px solid #444;
            font-size: 11px;
            max-width: 200px;
            line-height: 1.4;
        }
        
        .control-item {
            margin: 2px 0;
            color: #4CAF50;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="hud">
        <!-- Crosshair -->
        <div id="crosshair">
            <div class="crosshair-dot"></div>
        </div>
        
        <!-- Health Bar -->
        <div id="healthBar"></div>
        
        <!-- Hunger Bar -->
        <div id="hungerBar"></div>
        
        <!-- Hotbar -->
        <div id="hotbar"></div>
        
        <!-- Info -->
        <div id="info">
            <div class="info-line">FPS: <span id="fps">60</span></div>
            <div class="info-line">Pos: <span id="pos">0, 0, 0</span></div>
            <div class="info-line">Dim: <span id="dimension">Overworld</span></div>
            <div class="info-line" id="blockInfo">Block: Air</div>
        </div>
        
        <!-- Mining Bar -->
        <div id="miningBar">
            <div id="miningText">Mining...</div>
            <div id="miningProgress"></div>
        </div>
        
        <!-- Controls -->
        <div id="controls">
            <div class="control-item">W/A/S/D - Move</div>
            <div class="control-item">Space - Jump</div>
            <div class="control-item">Shift - Sprint</div>
            <div class="control-item">Mouse - Look</div>
            <div class="control-item">Left Click - Break</div>
            <div class="control-item">Right Click - Place</div>
            <div class="control-item">1-9 - Hotbar</div>
            <div class="control-item">E - Inventory</div>
            <div class="control-item">ESC - Menu</div>
        </div>
    </div>
    
    <!-- Menu -->
    <div id="menu">
        <div id="menuContent">
            <div id="menuTitle">MINECRAFT</div>
            <div style="margin: 20px 0; font-size: 18px; color: #ccc;">
                <button class="menu-button" onclick="game.resumeGame()">Resume Game</button>
                <button class="menu-button" onclick="game.newGame()">New Game</button>
                <button class="menu-button" onclick="document.location.reload()">Quit</button>
            </div>
            <div style="margin-top: 30px; font-size: 12px; color: #888;">
                JavaScript Edition | Made with Three.js
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
